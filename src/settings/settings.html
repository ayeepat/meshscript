<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>meshscript — настройки</title>
  <link rel="stylesheet" href="../common/theme.css" />
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, sans-serif;
      max-width: 720px; margin: 0 auto; padding: 32px 20px 60px;
      background: var(--bg); color: var(--text);
      -webkit-font-smoothing: antialiased;
    }
    h1 { font-size: 28px; font-weight: 700; letter-spacing: -0.4px; margin: 0 0 24px; }
    h2 {
      font-size: 13px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.5px; color: var(--secondary); margin: 28px 0 8px 16px;
    }
    .group { background: var(--card); border-radius: 18px; padding: 6px 16px; box-shadow: var(--shadow-card); }
    label { display: block; font-size: 13px; margin: 14px 0 6px; font-weight: 600; }
    input, textarea, select {
      width: 100%; padding: 11px 14px; border: none; background: var(--input-bg);
      border-radius: 12px; font: inherit; font-size: 14px; color: var(--text);
      outline: none; transition: box-shadow 0.15s ease;
    }
    input:focus, textarea:focus, select:focus { box-shadow: 0 0 0 3px var(--focus-ring); }
    textarea { min-height: 90px; resize: vertical; }
    select { appearance: none; -webkit-appearance: none; cursor: pointer; }
    .group > :last-child { margin-bottom: 14px; }
    button {
      background: var(--accent); color: var(--on-accent); border: none;
      border-radius: 14px; padding: 13px 22px; cursor: pointer;
      font: inherit; font-size: 15px; font-weight: 600;
      transition: transform 0.1s ease, filter 0.15s ease;
    }
    button:hover { filter: brightness(1.08); }
    button:active { transform: scale(0.97); }
    .actions { margin-top: 18px; }
    .ok { color: var(--green); font-size: 14px; font-weight: 600; margin-left: 12px; }
    .session {
      background: var(--card); border-radius: 14px; padding: 12px 16px;
      margin: 8px 0; font-size: 13px; box-shadow: var(--shadow-card);
    }
    .hint { font-size: 12px; color: var(--secondary); margin: 6px 0 0; }
    #history { margin-top: 8px; }
    .secondary-btn { background: var(--card); color: var(--accent); box-shadow: var(--shadow-btn); }

    /* iOS-style segmented control for the theme */
    .seg {
      display: flex; gap: 2px; margin: 14px 0;
      background: var(--input-bg); border-radius: 12px; padding: 3px;
    }
    .seg button {
      flex: 1; background: transparent; color: var(--secondary);
      border-radius: 9px; padding: 8px 0; font-size: 13.5px; font-weight: 600;
    }
    .seg button:hover { filter: none; color: var(--text); }
    .seg button.active {
      background: var(--card); color: var(--text);
      box-shadow: var(--shadow-btn);
    }
  </style>
</head>
<body>
  <h1>Настройки</h1>

  <h2>Оформление</h2>
  <div class="group">
    <div class="seg" id="themeSeg">
      <button data-pref="system">Системная</button>
      <button data-pref="light">Светлая</button>
      <button data-pref="dark">Тёмная</button>
    </div>
  </div>

  <h2>AI-провайдер</h2>
  <div class="group">
    <label>Провайдер</label>
    <select id="aiProvider">
      <option value="openrouter">OpenRouter — Gemini 2.5 Flash (рекомендуется)</option>
      <option value="groq">Groq (бесплатно, без карты)</option>
      <option value="gemini">Gemini (напрямую)</option>
    </select>
    <p class="hint">OpenRouter: ключ на https://openrouter.ai/keys · Groq: https://console.groq.com/keys</p>
  </div>

  <h2>Ключи API</h2>
  <div class="group">
    <label>OpenRouter API Key</label>
    <input id="openrouterApiKey" type="password" placeholder="sk-or-v1-..." />
    <label>Groq API Key</label>
    <input id="groqApiKey" type="password" placeholder="gsk_..." />
    <label>Gemini API Key</label>
    <input id="geminiApiKey" type="password" placeholder="AIza..." />
    <label>Supabase URL</label>
    <input id="supabaseUrl" type="text" placeholder="https://xxxx.supabase.co" />
    <label>Supabase anon key</label>
    <input id="supabaseAnonKey" type="password" placeholder="eyJ..." />
  </div>

  <h2>Базовые промпты (по категориям)</h2>
  <div class="group">
    <label>Точные науки (Алгебра/Геометрия/Физика/Химия)</label>
    <textarea id="p_worked_solution"></textarea>
    <label>Языки (Английский) — только ответы</label>
    <textarea id="p_direct_answer"></textarea>
    <label>Параграфы (История/Обществознание/География) — конспект</label>
    <textarea id="p_paragraph_summary"></textarea>
    <label>Русский язык — полное упражнение</label>
    <textarea id="p_russian_full"></textarea>
    <label>Литература — анализ произведений</label>
    <textarea id="p_literature"></textarea>
    <label>Тесты МЭШ — только номер и ответ</label>
    <textarea id="p_test_answer"></textarea>
  </div>

  <div class="actions"><button id="save">Сохранить</button><span id="status" class="ok"></span></div>

  <h2>История (последние 7 дней)</h2>
  <button id="reload" class="secondary-btn">Обновить историю</button>
  <div id="history"></div>

  <script type="module" src="settings.js"></script>
</body>
</html>
